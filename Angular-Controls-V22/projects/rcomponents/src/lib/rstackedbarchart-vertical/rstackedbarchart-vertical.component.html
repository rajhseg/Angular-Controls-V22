

<div  [style.font-family]="FontFamily" [id]="Id" [ngStyle]="{ 'pointer-events': IsDisabled ? 'none': '', 'user-select': IsDisabled ? 'none': 'auto' }">
  <canvas #rbar width="{{Width + MarginLeft + MarginRight}}" height="{{Height + MarginTop + MarginBottom}}"
    [ngStyle]="{ 'border-radius': EnableBorder ? '5px' : '', 'border': EnableBorder ? '0.5px solid '+BorderColor : '' }">

  </canvas>
  @if (IsRendered) {
    <div  style="margin-top:8px; position: relative; align-content: center;display: flex;flex-direction: row;"
      [ngStyle]="{ '--fontsize': FontSize, 'bottom':  '10px', 'height': DataListHeight+'px'}">
      <div [ngStyle]="{'width': (MarginX + MarginLeft) + 'px'}"></div>
      <div class="dataContainer" [ngStyle]="{'width': (Width - MarginX) +'px'}">
        @for (itm of this.Columns; track trackById($index, itm)) {
          <div class="data">
            @if (isPropString(itm.barItemsBackColor)) {
              <div class="indicator" [ngStyle]="{'backgroundColor': itm.barItemsBackColor }">
              </div>
            }
            @if (!isPropString(itm.barItemsBackColor)) {
              @for (clr of $any(itm.barItemsBackColor); track clr) {
                <div class="indicator"
                  [ngStyle]="{'backgroundColor': clr }">
                </div>
              }
            }
            <span class="title" style="width: fit-content;">
              {{itm.DisplayName}}
            </span>
          </div>
        }
      </div>
      <div [ngStyle]="{'width': MarginRight + 'px'}"></div>
    </div>
  }
</div>
