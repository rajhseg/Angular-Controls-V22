

<div  [style.font-family]="FontFamily" [id]="Id" style="position: relative;" [ngStyle]="{ 'width': ChartWidth+'px', 
                                                        'height': (ChartWidth + DataListHeight) +'px',
                                                        'pointer-events': IsDisabled ? 'none': '', 
                                                        'user-select': IsDisabled ? 'none' : 'auto' }">
  <canvas style="position: absolute;" #procan width="{{ChartWidth}}" height="{{ChartWidth}}"
    [ngStyle]="{ 'border-radius': EnableBorder ? '5px' : '', 'border': EnableBorder ? '0.5px solid '+BorderColor : '' }"
    class="canvasCenter">

  </canvas>
  @if (IsRendered) {
<div  style="position: relative;" [ngStyle]="{ '--fontsize': FontSize, 'bottom':-ChartWidth+'px', 
                                                                      'height': DataListHeight+'px' }">
      <div class="dataContainer">
        @for (itm of this.Items; track trackById($index, itm)) {
          <div class="data">
            <div class="indicator" [ngStyle]="{'backgroundColor': itm.BackgroundColor}">
            </div>
            <span class="title" [ngStyle]="{'width': calculateTitleWidth()+'px'}">{{itm.Title}}</span>
            <span class="title" [ngStyle]="{'width': calculateValueWidth()+'px'}">({{itm.Value}})</span>
          </div>
        }
      </div>
    </div>
  }
</div>
