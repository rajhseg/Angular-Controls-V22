<div [style.font-family]="FontFamily" [id]="Id" class=""
  [ngStyle]="{ 'width': getActualWidth(), 'pointer-events': (IsDisabled || IsReadOnly) ? 'none' : '', 'user-select' : IsDisabled ? 'none' : 'auto' }">

  @for (item of Items; track trackById(i, item); let i = $index) {

    <div class="" style="display: flex; flex-direction: column;"  [id]="item.ContentId"
      [ngStyle]="{ 'margin-bottom': GapBetweenContent}">

      <div (click)="toggle($event, item)" class="acc"
            [ngStyle]="{ 'width': ContentWidth, 'background-color': TitleBarBackColor, 'border': '1px solid '+ BorderColor, 
                         'border-bottom': !item.IsOpened ? 'none': '1px solid '+ BorderColor }">

        <span [ngStyle]="{'color': TitleForeColor}">{{item.Title}}</span>
        <span class="circle" [ngStyle]="{ 'border' : '0.5px solid ' + TitleForeColor }">
          <span class="droppos" [ngStyle]="{ 'color': TitleForeColor }"
          [ngClass]="{ 'icon-up': item.IsOpened, 'icon-down': !item.IsOpened}"></span>
        </span>
      
      </div>
      <div class="cnt" [ngStyle]="{ 'background-color': ContentBackgroundColor,
                            'height': item.IsOpened ? item.Height : '0px',
                            'font-size': FontSize,
                            'border': '1px solid '+ BorderColor,
                            'border-top': !item.IsOpened ? 'none': 'none',
                            'color': ContentForeColor,
                            'width': ContentWidth,  
                            'display':'block',
                            'overflow':'hidden',
                            'pointer-events': IsReadOnly ? 'none': ''}">
        <ng-container *ngTemplateOutlet="item.templateRef">
        </ng-container>
      </div>
    </div>
    
  }

</div>
